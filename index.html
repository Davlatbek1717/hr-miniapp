<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>HR Panel</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
/* ─── Reset ────────────────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ─── Design Tokens (Telegram Theme) ───────────────────────────────────────── */
:root{
  --bg:       var(--tg-theme-bg-color,#18181b);
  --bg2:      var(--tg-theme-secondary-bg-color,#27272a);
  --bg3:      color-mix(in srgb,var(--bg2) 70%,var(--bg) 30%);
  --text:     var(--tg-theme-text-color,#fafafa);
  --hint:     var(--tg-theme-hint-color,#71717a);
  --link:     var(--tg-theme-link-color,#3b82f6);
  --btn:      var(--tg-theme-button-color,#3b82f6);
  --btn-text: var(--tg-theme-button-text-color,#ffffff);
  --sep:      var(--tg-theme-section-separator-color,rgba(255,255,255,.06));

  --green:  #22c55e;
  --red:    #ef4444;
  --orange: #f59e0b;
  --purple: #a855f7;
  --blue:   #3b82f6;

  --r:    16px;
  --r-sm: 10px;
  --r-xs: 6px;
  --hdr:  58px;
  --nav:  50px;
  --safe: env(safe-area-inset-bottom,0px);
}

/* ─── Base ──────────────────────────────────────────────────────────────────── */
html,body{
  height:100%;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',system-ui,sans-serif;
  font-size:15px;line-height:1.4;
  -webkit-font-smoothing:antialiased;overscroll-behavior:none;
}
input,textarea,select{font-family:inherit;font-size:inherit}

/* ─── Layout ────────────────────────────────────────────────────────────────── */
#app{display:flex;flex-direction:column;height:100dvh;overflow:hidden}

#header{
  height:var(--hdr);padding:0 16px;
  display:flex;align-items:center;gap:12px;
  background:var(--bg);
  border-bottom:1px solid var(--sep);
  flex-shrink:0;
}

#nav{
  height:var(--nav);
  display:flex;align-items:center;gap:4px;padding:0 10px;
  background:var(--bg);
  border-bottom:1px solid var(--sep);
  overflow-x:auto;flex-shrink:0;scrollbar-width:none;
}
#nav::-webkit-scrollbar{display:none}

#content{
  flex:1;overflow-y:auto;padding:14px 14px calc(80px + var(--safe));
  -webkit-overflow-scrolling:touch;
}

/* ─── Header ────────────────────────────────────────────────────────────────── */
.h-avatar{
  width:36px;height:36px;border-radius:50%;
  background:rgba(59,130,246,.18);color:var(--btn);
  font-size:13px;font-weight:700;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  letter-spacing:-.3px;
}
.h-info{flex:1;min-width:0}
.h-name{font-size:15px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.h-sub{font-size:12px;color:var(--hint);margin-top:1px}
.role-tag{
  font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  padding:3px 8px;border-radius:20px;flex-shrink:0;
}
.role-tag.worker    {background:rgba(34,197,94,.14);color:var(--green)}
.role-tag.admin     {background:rgba(59,130,246,.14);color:var(--blue)}
.role-tag.superadmin{background:rgba(168,85,247,.14);color:var(--purple)}

/* ─── Nav Tabs ──────────────────────────────────────────────────────────────── */
.tab{
  flex-shrink:0;padding:6px 14px;border-radius:20px;
  font-size:12px;font-weight:500;cursor:pointer;
  color:var(--hint);border:none;background:transparent;
  transition:all .18s;white-space:nowrap;
  -webkit-tap-highlight-color:transparent;
}
.tab.active{
  background:var(--btn);color:var(--btn-text);font-weight:600;
}

/* ─── Section Header ────────────────────────────────────────────────────────── */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin:0 2px 10px}
.sec-title{font-size:12px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.6px}
.sec-count{font-size:12px;color:var(--hint)}
.sec-add{
  width:28px;height:28px;border-radius:50%;
  background:rgba(59,130,246,.12);color:var(--btn);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;cursor:pointer;line-height:1;
  -webkit-tap-highlight-color:transparent;transition:opacity .15s;
}
.sec-add:active{opacity:.6}

/* ─── Cards ─────────────────────────────────────────────────────────────────── */
.card{
  background:var(--bg2);border-radius:var(--r);
  overflow:hidden;margin-bottom:10px;
}
.card-header{
  padding:12px 16px 0;
  font-size:11px;font-weight:700;color:var(--hint);
  text-transform:uppercase;letter-spacing:.6px;
}
.card-body{padding:0 16px 12px}
.card-full{padding:16px}

.card-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 16px;border-bottom:1px solid var(--sep);min-height:44px;
}
.card-row:last-child{border-bottom:none}
.card-row:first-child{border-top:none}
.row-label{font-size:14px;color:var(--hint)}
.row-value{font-size:14px;font-weight:600;text-align:right;max-width:60%;color:var(--text)}

/* ─── Stats Grid ────────────────────────────────────────────────────────────── */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.stats-row.two{grid-template-columns:repeat(2,1fr)}
.stat{
  background:var(--bg2);border-radius:var(--r-sm);
  padding:14px 10px;text-align:center;
}
.stat-n{font-size:28px;font-weight:800;letter-spacing:-1px}
.stat-l{font-size:11px;color:var(--hint);margin-top:3px;font-weight:500}
.stat.green .stat-n{color:var(--green)}
.stat.red   .stat-n{color:var(--red)}
.stat.orange.stat-n{color:var(--orange)}
.stat.blue  .stat-n{color:var(--blue)}

/* ─── Action Buttons ────────────────────────────────────────────────────────── */
.act-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.act-btn{
  background:var(--bg2);border:none;border-radius:var(--r);
  padding:18px 12px 14px;cursor:pointer;color:var(--text);
  text-align:center;transition:transform .1s,opacity .1s;
  -webkit-tap-highlight-color:transparent;
}
.act-btn:active{transform:scale(.93);opacity:.8}
.act-btn:disabled{opacity:.28;cursor:not-allowed;transform:none}
.act-btn .a-ico{
  width:36px;height:36px;border-radius:10px;
  margin:0 auto 10px;display:flex;align-items:center;justify-content:center;
  font-size:17px;font-weight:700;
}
.act-btn .a-lbl{font-size:13px;font-weight:600}
.act-btn.success .a-ico{background:rgba(34,197,94,.15);color:var(--green)}
.act-btn.danger  .a-ico{background:rgba(239,68,68,.15);color:var(--red)}
.act-btn.warning .a-ico{background:rgba(245,158,11,.15);color:var(--orange)}
.act-btn.primary .a-ico{background:rgba(59,130,246,.15);color:var(--blue)}
.act-btn.muted   .a-ico{background:rgba(255,255,255,.07);color:var(--hint)}

/* ─── Timeline ──────────────────────────────────────────────────────────────── */
.timeline{display:flex;padding:4px 0 8px;position:relative}
.timeline::before{
  content:"";position:absolute;top:27px;left:calc(16%);right:calc(16%);
  height:2px;background:var(--sep);z-index:0;
}
.tl-item{flex:1;text-align:center;position:relative;z-index:1}
.tl-dot{
  width:40px;height:40px;border-radius:50%;
  margin:0 auto 8px;display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;border:2px solid transparent;
}
.tl-dot.done  {background:rgba(34,197,94,.15);border-color:var(--green);color:var(--green)}
.tl-dot.active{background:rgba(59,130,246,.15);border-color:var(--blue);color:var(--blue)}
.tl-dot.empty {background:var(--bg);border-color:var(--sep);color:var(--hint)}
.tl-time{font-size:13px;font-weight:700;line-height:1}
.tl-lbl {font-size:11px;color:var(--hint);margin-top:3px}

/* ─── Status Dot ────────────────────────────────────────────────────────────── */
.sdot{
  width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0;
}
.sdot.green {background:var(--green)}
.sdot.red   {background:var(--red)}
.sdot.orange{background:var(--orange)}
.sdot.blue  {background:var(--blue)}
.sdot.dim   {background:rgba(255,255,255,.15)}

/* ─── List Items ────────────────────────────────────────────────────────────── */
.list-item{
  display:flex;align-items:center;gap:12px;
  padding:11px 16px;border-bottom:1px solid var(--sep);
  min-height:52px;
}
.list-item:last-child{border-bottom:none}
.list-item.tap{cursor:pointer;-webkit-tap-highlight-color:transparent}
.list-item.tap:active{background:rgba(255,255,255,.04)}
.li-av{
  width:38px;height:38px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;
  background:rgba(59,130,246,.14);color:var(--blue);
}
.li-info{flex:1;min-width:0}
.li-name{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.li-sub{font-size:12px;color:var(--hint);margin-top:2px}
.li-right{flex-shrink:0;display:flex;align-items:center;gap:8px}
.chevron{color:var(--sep);font-size:20px;font-weight:300}

/* ─── Chips ─────────────────────────────────────────────────────────────────── */
.chip{
  font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;
  display:inline-block;white-space:nowrap;letter-spacing:.1px;
}
.chip-present {background:rgba(34,197,94,.12);color:var(--green)}
.chip-late    {background:rgba(245,158,11,.12);color:var(--orange)}
.chip-absent  {background:rgba(255,255,255,.07);color:var(--hint)}
.chip-lunch   {background:rgba(59,130,246,.12);color:var(--blue)}
.chip-pending {background:rgba(245,158,11,.12);color:var(--orange)}
.chip-approved{background:rgba(34,197,94,.12);color:var(--green)}
.chip-rejected{background:rgba(239,68,68,.12);color:var(--red)}

/* ─── History ───────────────────────────────────────────────────────────────── */
.hist-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px;border-bottom:1px solid var(--sep);
}
.hist-item:last-child{border-bottom:none}
.hist-date{font-size:13px;color:var(--hint);min-width:68px}
.hist-times{flex:1;font-size:13px}
.hist-dur{font-size:12px;color:var(--hint)}

/* ─── Leave Cards ───────────────────────────────────────────────────────────── */
.leave-card{background:var(--bg2);border-radius:var(--r);padding:0;overflow:hidden;margin-bottom:8px}
.leave-body{padding:14px 16px}
.leave-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.leave-name{font-size:14px;font-weight:700}
.leave-dates{font-size:15px;font-weight:700;margin-bottom:2px}
.leave-meta{font-size:12px;color:var(--hint)}
.leave-reason{font-size:13px;color:var(--hint);margin:8px 0 12px;line-height:1.5}
.leave-acts{display:flex;gap:8px}
.la-btn{
  flex:1;padding:10px;border:none;border-radius:var(--r-sm);
  font-size:13px;font-weight:700;cursor:pointer;
  -webkit-tap-highlight-color:transparent;transition:opacity .15s;
}
.la-btn:active{opacity:.7}
.la-btn.approve{background:rgba(34,197,94,.12);color:var(--green)}
.la-btn.reject {background:rgba(239,68,68,.10);color:var(--red)}

/* ─── Forms ─────────────────────────────────────────────────────────────────── */
.form-group{margin-bottom:16px}
.form-label{
  display:block;font-size:12px;font-weight:700;color:var(--hint);
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;
}
.form-input{
  width:100%;background:var(--bg);
  border:1.5px solid rgba(255,255,255,.1);
  border-radius:var(--r-sm);padding:12px 14px;
  color:var(--text);font-size:15px;outline:none;
  -webkit-appearance:none;color-scheme:dark;
  transition:border-color .2s;
}
.form-input:focus{border-color:var(--btn)}
.form-input::placeholder{color:var(--hint)}
select.form-input{cursor:pointer}
textarea.form-input{resize:none;line-height:1.5}
.form-hint{font-size:12px;color:var(--hint);margin-top:6px;line-height:1.45}

.btn-primary{
  width:100%;background:var(--btn);color:var(--btn-text);
  border:none;border-radius:var(--r);padding:15px;
  font-size:16px;font-weight:700;cursor:pointer;
  -webkit-tap-highlight-color:transparent;transition:opacity .15s;
}
.btn-primary:active{opacity:.8}
.btn-primary:disabled{opacity:.35;cursor:not-allowed}
.btn-secondary{
  width:100%;background:rgba(59,130,246,.1);color:var(--blue);
  border:none;border-radius:var(--r);padding:13px;
  font-size:15px;font-weight:600;cursor:pointer;
  -webkit-tap-highlight-color:transparent;transition:opacity .15s;
  margin-top:8px;
}
.btn-secondary:active{opacity:.7}
.btn-danger{
  width:100%;background:rgba(239,68,68,.1);color:var(--red);
  border:none;border-radius:var(--r);padding:13px;
  font-size:15px;font-weight:600;cursor:pointer;
  -webkit-tap-highlight-color:transparent;transition:opacity .15s;
  margin-top:8px;
}
.btn-danger:active{opacity:.7}

/* ─── Toggle ────────────────────────────────────────────────────────────────── */
.toggle-wrap{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--sep)}
.toggle-wrap:last-child{border-bottom:none}
.toggle-label{font-size:14px}
.toggle{position:relative;width:44px;height:26px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-track{
  position:absolute;inset:0;border-radius:26px;cursor:pointer;
  background:rgba(255,255,255,.15);transition:background .2s;
}
.toggle input:checked + .toggle-track{background:var(--green)}
.toggle-thumb{
  position:absolute;top:3px;left:3px;width:20px;height:20px;
  border-radius:50%;background:#fff;transition:left .2s;
  pointer-events:none;
}
.toggle input:checked ~ .toggle-thumb{left:21px}

/* ─── Info Box ──────────────────────────────────────────────────────────────── */
.info-box{
  background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.15);
  border-radius:var(--r-sm);padding:13px 14px;margin-bottom:10px;
}
.info-box p{font-size:13px;color:var(--hint);line-height:1.55}

/* ─── Invite Box ────────────────────────────────────────────────────────────── */
.invite-box{
  background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.2);
  border-radius:var(--r-sm);padding:14px;margin-bottom:10px;
}
.invite-link{
  font-size:13px;word-break:break-all;color:var(--green);
  margin-bottom:10px;line-height:1.45;
}
.copy-btn{
  background:rgba(34,197,94,.12);color:var(--green);
  border:none;border-radius:var(--r-xs);
  padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;
}
.copy-btn:active{opacity:.7}

/* ─── Branch Card ───────────────────────────────────────────────────────────── */
.branch-card{
  background:var(--bg2);border-radius:var(--r);
  padding:14px 16px;margin-bottom:8px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  display:flex;align-items:center;gap:12px;
}
.branch-card:active{opacity:.75}
.branch-ico{
  width:40px;height:40px;border-radius:12px;flex-shrink:0;
  background:rgba(59,130,246,.12);color:var(--blue);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;
}
.branch-info{flex:1;min-width:0}
.branch-name{font-size:15px;font-weight:700}
.branch-meta{font-size:12px;color:var(--hint);margin-top:2px}

/* ─── Skeleton ──────────────────────────────────────────────────────────────── */
@keyframes shimmer{
  0%  {background-position:200% 0}
  100%{background-position:-200% 0}
}
.skel{
  background:linear-gradient(90deg,var(--bg2) 25%,var(--bg3) 50%,var(--bg2) 75%);
  background-size:200% 100%;
  animation:shimmer 1.6s ease infinite;
  border-radius:8px;
}
.skel-card{background:var(--bg2);border-radius:var(--r);padding:16px;margin-bottom:10px}
.skel-h{height:14px;margin-bottom:10px}
.skel-row{height:10px;margin-bottom:8px}
.skel-row.short{width:60%}
.skel-row.xshort{width:35%}
.skel-av{width:38px;height:38px;border-radius:50%;flex-shrink:0}

/* ─── Loading / Empty ───────────────────────────────────────────────────────── */
.empty-state{text-align:center;padding:56px 20px}
.empty-ico{
  width:56px;height:56px;border-radius:18px;
  background:var(--bg2);margin:0 auto 16px;
  display:flex;align-items:center;justify-content:center;
}
.empty-ico span{font-size:26px;font-weight:800;color:var(--hint)}
.empty-txt{font-size:14px;color:var(--hint);line-height:1.6}

/* ─── Toast ─────────────────────────────────────────────────────────────────── */
#toast{
  position:fixed;bottom:calc(24px + var(--safe));left:50%;
  transform:translateX(-50%) translateY(10px);
  background:rgba(39,39,42,.96);color:var(--text);
  padding:10px 20px;border-radius:24px;
  font-size:14px;font-weight:500;opacity:0;
  transition:opacity .22s,transform .22s;z-index:999;
  white-space:nowrap;max-width:88vw;text-align:center;
  backdrop-filter:blur(16px);pointer-events:none;
  border:1px solid rgba(255,255,255,.08);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ─── Status Display ────────────────────────────────────────────────────────── */
.status-banner{
  padding:20px 16px;text-align:center;
}
.status-dot-lg{
  width:54px;height:54px;border-radius:50%;
  margin:0 auto 10px;display:flex;align-items:center;justify-content:center;
}
.status-dot-lg.green {background:rgba(34,197,94,.12);border:2px solid rgba(34,197,94,.3)}
.status-dot-lg.orange{background:rgba(245,158,11,.12);border:2px solid rgba(245,158,11,.3)}
.status-dot-lg.dim   {background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.1)}
.status-dot-lg.blue  {background:rgba(59,130,246,.12);border:2px solid rgba(59,130,246,.3)}
.sdot-inner{width:20px;height:20px;border-radius:50%}
.sdot-inner.green {background:var(--green)}
.sdot-inner.orange{background:var(--orange)}
.sdot-inner.dim   {background:var(--hint)}
.sdot-inner.blue  {background:var(--blue)}
.status-label{font-size:17px;font-weight:700}
.status-date{font-size:12px;color:var(--hint);margin-top:3px}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="h-avatar" id="h-av">?</div>
    <div class="h-info">
      <div class="h-name" id="h-name">HR Panel</div>
      <div class="h-sub"  id="h-sub">Yuklanmoqda</div>
    </div>
    <span class="role-tag" id="h-badge"></span>
  </div>
  <div id="nav"></div>
  <div id="content">
    <div id="skeleton-boot">
      <div class="skel-card">
        <div class="skel skel-h" style="width:50%;margin-bottom:16px"></div>
        <div class="skel skel-row"></div>
        <div class="skel skel-row short"></div>
      </div>
      <div class="skel-card">
        <div style="display:flex;gap:12px;margin-bottom:12px">
          <div class="skel skel-av"></div>
          <div style="flex:1">
            <div class="skel skel-row" style="margin-bottom:8px"></div>
            <div class="skel skel-row short"></div>
          </div>
        </div>
        <div class="skel skel-row"></div>
        <div class="skel skel-row xshort"></div>
      </div>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
const API = window.HRBOT_API_URL || "https://intersection-acc-unified-believed.trycloudflare.com";
const BOT_USERNAME = "hr_boshqaruv_bot";

const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();
tg.disableVerticalSwipes?.();

const MB = tg.MainButton;
const BB = tg.BackButton;

const S = {me:null, today:null, activeTab:null, stack:[], lookups:{}};

// ── API ──────────────────────────────────────────────────────────────────────
async function api(path, opts={}) {
  const r = await fetch(API + path, {
    method:  opts.method || "GET",
    headers: {"Content-Type":"application/json","Authorization":"tma "+tg.initData,...opts.headers},
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  const json = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(json.detail || "Xato yuz berdi");
  return json;
}

async function getLookup(key) {
  if (S.lookups[key]) return S.lookups[key];
  const data = await api(`/api/lookup/${key}`);
  S.lookups[key] = data;
  return data;
}

// ── Toast & Haptics ──────────────────────────────────────────────────────────
let _tt;
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(_tt);
  _tt = setTimeout(() => el.classList.remove("show"), 2800);
}
const hap = {
  ok:    () => tg.HapticFeedback?.notificationOccurred("success"),
  err:   () => tg.HapticFeedback?.notificationOccurred("error"),
  warn:  () => tg.HapticFeedback?.notificationOccurred("warning"),
  light: () => tg.HapticFeedback?.impactOccurred("light"),
  med:   () => tg.HapticFeedback?.impactOccurred("medium"),
};

// ── Utils ────────────────────────────────────────────────────────────────────
const initials = n => (n||"?").split(" ").slice(0,2).map(w=>w[0]).join("").toUpperCase();
const fmtDate  = iso => {if(!iso)return""; const [y,m,d]=iso.split("-"); return `${d}.${m}.${y}`};
const today    = () => new Date().toISOString().slice(0,10);
const thisMonth= () => new Date().toISOString().slice(0,7);

function chip(label, cls) { return `<span class="chip ${cls}">${label}</span>`; }
function statusChip(st, atLunch) {
  if (atLunch) return chip("Tushlikda","chip-lunch");
  const M = {present:["Keldi","chip-present"],late:["Kech keldi","chip-late"],
             absent:["Kelmadi","chip-absent"],on_leave:["Ta'tilida","chip-approved"],
             holiday:["Dam olish","chip-approved"]};
  const [l,c] = M[st] || ["—","chip-absent"];
  return chip(l, c);
}
function leaveChip(st) {
  const M = {pending:["Kutilmoqda","chip-pending"],
             approved:["Tasdiqlandi","chip-approved"],rejected:["Rad etildi","chip-rejected"]};
  const [l,c] = M[st] || [st,"chip-absent"];
  return chip(l, c);
}

function setContent(html) { document.getElementById("content").innerHTML = html; }

function skeletonList(rows=3) {
  const row = `<div class="list-item">
    <div class="skel skel-av"></div>
    <div style="flex:1">
      <div class="skel skel-row" style="margin-bottom:8px"></div>
      <div class="skel skel-row short"></div>
    </div>
  </div>`;
  return `<div class="card">${row.repeat(rows)}</div>`;
}
function skeletonCard() {
  return `<div class="skel-card">
    <div class="skel skel-h" style="width:55%;margin-bottom:14px"></div>
    <div class="skel skel-row"></div>
    <div class="skel skel-row short"></div>
    <div class="skel skel-row xshort" style="margin-bottom:0"></div>
  </div>`;
}
function emptyState(letter, title, sub="") {
  return `<div class="empty-state">
    <div class="empty-ico"><span>${letter}</span></div>
    <div style="font-size:16px;font-weight:700;margin-bottom:6px">${title}</div>
    ${sub?`<div class="empty-txt">${sub}</div>`:""}
  </div>`;
}

// ── Navigation ───────────────────────────────────────────────────────────────
const TABS = {
  worker:     [{id:"home",lbl:"Bugun"},{id:"history",lbl:"Tarix"},
               {id:"leave-w",lbl:"Ta'til"},{id:"profile",lbl:"Profil"}],
  admin:      [{id:"monitoring",lbl:"Bugun"},{id:"workers-a",lbl:"Xodimlar"},
               {id:"leaves-a",lbl:"Ta'tillar"},{id:"report",lbl:"Hisobot"},
               {id:"att-edit",lbl:"Davomat"}],
  superadmin: [{id:"dashboard",lbl:"Asosiy"},{id:"monitoring",lbl:"Monitoring"},
               {id:"workers-sa",lbl:"Xodimlar"},{id:"report-sa",lbl:"Hisobot"},
               {id:"branches",lbl:"Filiallar"},{id:"positions",lbl:"Lavozimlar"},
               {id:"schedules",lbl:"Jadvallar"},{id:"admins",lbl:"Adminlar"},
               {id:"settings",lbl:"Sozlamalar"}],
};

function buildNav(role) {
  const tabs = TABS[role] || TABS.worker;
  document.getElementById("nav").innerHTML = tabs.map(t =>
    `<button class="tab" data-tab="${t.id}" onclick="switchTab('${t.id}')">${t.lbl}</button>`
  ).join("");
  switchTab(tabs[0].id);
}

function switchTab(id) {
  clearStack();
  S.activeTab = id;
  document.querySelectorAll(".tab").forEach(t =>
    t.classList.toggle("active", t.dataset.tab === id));
  renderTab(id);
}

function clearStack() { S.stack = []; hideBack(); hideMB(); }

function pushView(renderFn, data={}) {
  S.stack.push({renderFn, data});
  showBack();
  setContent(skeletonCard() + skeletonList());
  renderFn(data).catch(e => setContent(emptyState("!", e.message)));
}

function popView() {
  S.stack.pop();
  hideMB();
  if (S.stack.length === 0) { hideBack(); renderTab(S.activeTab); }
  else {
    const top = S.stack[S.stack.length - 1];
    setContent(skeletonCard());
    top.renderFn(top.data).catch(e => setContent(emptyState("!", e.message)));
  }
}

function showBack() { BB.show(); BB.onClick(popView); }
function hideBack() { BB.hide(); BB.offClick(popView); }
function showMB(text, fn, color) {
  MB.setText(text); if(color)MB.color=color; MB.onClick(fn); MB.show();
}
function hideMB() { MB.hide(); MB.offClick(); }

async function renderTab(id) {
  setContent(skeletonCard() + skeletonList());
  try {
    switch(id) {
      case "home":       await Worker.renderHome();      break;
      case "history":    await Worker.renderHistory();   break;
      case "leave-w":    await Worker.renderLeave();     break;
      case "profile":         Worker.renderProfile();    break;
      case "monitoring": await Admin.renderMonitoring(); break;
      case "workers-a":  await Admin.renderWorkers();    break;
      case "leaves-a":   await Admin.renderLeaves();     break;
      case "report":          Admin.renderReport();      break;
      case "att-edit":   await Admin.renderAttEdit();    break;
      case "dashboard":  await SA.renderDashboard();     break;
      case "workers-sa": await SA.renderWorkers();       break;
      case "report-sa":       SA.renderReport();         break;
      case "branches":   await SA.renderBranches();      break;
      case "positions":  await SA.renderPositions();     break;
      case "schedules":  await SA.renderSchedules();     break;
      case "admins":     await SA.renderAdmins();        break;
      case "settings":   await SA.renderSettings();      break;
      default: setContent(emptyState("?","Tez orada"));
    }
  } catch(e) { setContent(emptyState("!", e.message)); }
}

    hap.light();

    const st   = document.getElementById("ea-st")?.value;

      hap.ok(); toast("Saqlandi");
      popView();
    } catch(e) { hap.err(); tg.showAlert(e.message); }

};

        </div>
      </div>
      ${scs.length ? `<div class="card">${scs.map(sc => `
        <div class="list-item">
          <div class="li-info">
            <div class="li-name">${sc.name}</div>
            <div class="li-sub">${sc.start_time}–${sc.end_time}
              ${sc.lunch_start?`· Tushlik: ${sc.lunch_start}–${sc.lunch_end}`:""}
              · Kech: >${sc.late_threshold}d</div>
          </div>
          <div class="li-right">
            <button onclick="SA.deleteSchedule(${sc.id},'${sc.name}')"
              style="background:rgba(239,68,68,.1);border:none;color:var(--red);
              border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer">
              O'chir</button>
          </div>
        </div>`).join("")}</div>` : emptyState("J","Jadvallar yo'q")}`);
  },

  addScheduleForm() {
    pushView(async () => {
      setContent(`
        <div class="sec-hdr"><span class="sec-title">Yangi jadval</span></div>
        <div class="card card-full">
          <div class="form-group">
            <label class="form-label">Jadval nomi</label>
            <input class="form-input" id="ns-name" placeholder="Masalan: Standart 9-18"/>
          </div>
          <div class="form-group">
            <label class="form-label">Ish boshlanishi</label>
            <input class="form-input" type="time" id="ns-st" value="09:00"/>
          </div>
          <div class="form-group">
            <label class="form-label">Ish tugashi</label>
            <input class="form-input" type="time" id="ns-et" value="18:00"/>
          </div>
          <div class="form-group">
            <label class="form-label">Tushlik boshlanishi (ixtiyoriy)</label>
            <input class="form-input" type="time" id="ns-ls" value="13:00"/>
          </div>
          <div class="form-group">
            <label class="form-label">Tushlik tugashi (ixtiyoriy)</label>
            <input class="form-input" type="time" id="ns-le" value="14:00"/>
          </div>
          <div class="form-group" style="margin-bottom:0">
            <label class="form-label">Kech kelish chegarasi (daqiqa)</label>
            <input class="form-input" type="number" id="ns-lt" value="15" min="0" max="120"/>
          </div>
        </div>
        <button class="btn-primary" onclick="SA.createSchedule()">Yaratish</button>`);
    });
  },

  async createSchedule() {
    hap.light();
    const name = document.getElementById("ns-name")?.value.trim();
    const st   = document.getElementById("ns-st")?.value;
    const et   = document.getElementById("ns-et")?.value;
    const ls   = document.getElementById("ns-ls")?.value||null;
    const le   = document.getElementById("ns-le")?.value||null;
    const lt   = parseInt(document.getElementById("ns-lt")?.value)||15;
    if (!name||!st||!et) { hap.warn(); toast("Asosiy maydonlarni to'ldiring"); return; }
    try {
      await api("/api/superadmin/schedules",{method:"POST",body:{
        name, start_time:st, end_time:et,
        lunch_start:ls||null, lunch_end:le||null, late_threshold:lt}});
      hap.ok(); toast("Jadval yaratildi");
      popView(); S.lookups={};
    } catch(e) { hap.err(); tg.showAlert(e.message); }
  },

  async deleteSchedule(sid, name) {
    hap.med();
    tg.showConfirm(`"${name}" jadvalini o'chirishni tasdiqlaysizmi?`, async ok => {
      if (!ok) return;
      try {
        await api(`/api/superadmin/schedules/${sid}`,{method:"DELETE"});
        hap.ok(); toast("O'chirildi");
        await SA.renderSchedules(); S.lookups={};
      } catch(e) { hap.err(); tg.showAlert(e.message); }
    });
  },

  async renderAdmins() {
    const admins = await api("/api/superadmin/admins");
    setContent(`
      <div class="sec-hdr">
        <span class="sec-title">Adminlar</span>
        <div style="display:flex;gap:8px;align-items:center">
          <span class="sec-count">${admins.length} ta</span>
          <span class="sec-add" onclick="SA.addAdminForm()">+</span>
        </div>
      </div>
      ${admins.length ? `<div class="card">${admins.map(a => `
        <div class="list-item">
          <div class="li-av">${initials(a.full_name)}</div>
          <div class="li-info">
            <div class="li-name">${a.full_name}</div>
            <div class="li-sub">${a.branch?.name||"Filial yo'q"} · ${a.telegram_id?"Faol":"Kutilmoqda"}</div>
          </div>
          <div class="li-right">
            <span class="sdot ${a.telegram_id?"green":"orange"}"></span>
            <button onclick="SA.removeAdmin(${a.id},'${a.full_name}')"
              style="background:rgba(239,68,68,.1);border:none;color:var(--red);
              border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer">
              O'chir</button>
          </div>
        </div>`).join("")}</div>` : emptyState("A","Adminlar yo'q")}`);
  },

  addAdminForm() {
    pushView(async () => {
      const branches = await getLookup("branches");
      setContent(`
        <div class="sec-hdr"><span class="sec-title">Yangi admin</span></div>
        <div class="card card-full">
          <div class="form-group">
            <label class="form-label">To'liq ism</label>
            <input class="form-input" id="na-name" placeholder="Ism Familiya"/>
          </div>
          <div class="form-group" style="margin-bottom:0">
            <label class="form-label">Filial (ixtiyoriy)</label>
            <select class="form-input" id="na-br">
              <option value="">— Tanlang —</option>
              ${branches.map(b=>`<option value="${b.id}">${b.name}</option>`).join("")}
            </select>
          </div>
        </div>
        <button class="btn-primary" onclick="SA.createAdmin()">Yaratish</button>
        <div class="info-box" style="margin-top:10px">
          <p>Yaratilgandan keyin taklif havolasi ko'rsatiladi</p>
        </div>`);
    });
  },

  async createAdmin() {
    hap.light();
    const name = document.getElementById("na-name")?.value.trim();
    const br   = parseInt(document.getElementById("na-br")?.value)||null;
    if (!name) { hap.warn(); toast("Ism kiriting"); return; }
    try {
      const data = await api("/api/superadmin/admins",{method:"POST",body:{full_name:name,branch_id:br}});
      hap.ok();
      setContent(`
        <div class="card" style="text-align:center;padding:28px 16px">
          <div style="font-size:17px;font-weight:800;margin-bottom:6px">Admin yaratildi</div>
          <div style="font-size:14px;color:var(--hint)">Quyidagi havolani adminga yuboring</div>
        </div>
        <div class="sec-hdr"><span class="sec-title">Taklif havolasi</span></div>
        <div class="invite-box">
          <div style="font-size:11px;font-weight:700;color:var(--hint);text-transform:uppercase;
            letter-spacing:.5px;margin-bottom:8px">24 soat amal qiladi</div>
          <div class="invite-link">${data.invite_link}</div>
          <button class="copy-btn" onclick="navigator.clipboard?.writeText('${data.invite_link}')
            .then(()=>{hap.ok();toast('Nusxa olindi')})">Nusxa olish</button>
        </div>`);
    } catch(e) { hap.err(); tg.showAlert(e.message); }
  },

  async removeAdmin(aid, name) {
    hap.med();
    tg.showConfirm(`"${name}" adminni o'chirishni tasdiqlaysizmi?`, async ok => {
      if (!ok) return;
      try {
        await api(`/api/superadmin/admins/${aid}`,{method:"DELETE"});
        hap.ok(); toast("O'chirildi");
        await SA.renderAdmins();
      } catch(e) { hap.err(); tg.showAlert(e.message); }
    });
  },

  async renderSettings() {
    const s = await api("/api/superadmin/settings");
    setContent(`
      <div class="sec-hdr"><span class="sec-title">Bildirishnoma vaqtlari</span></div>
      <div class="card card-full">
        <div class="form-group">
          <label class="form-label">Kelish eslatmasi</label>
          <input class="form-input" type="time" id="st-cr" value="${s.checkin_reminder_time}"/>
        </div>
        <div class="form-group">
          <label class="form-label">Kech kelish tekshiruvi</label>
          <input class="form-input" type="time" id="st-lc" value="${s.late_check_time}"/>
        </div>
        <div class="form-group">
          <label class="form-label">Kelmadi tekshiruvi</label>
          <input class="form-input" type="time" id="st-ac" value="${s.absent_check_time}"/>
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">Avto-hisobot vaqti</label>
          <input class="form-input" type="time" id="st-ar" value="${s.auto_report_time}"/>
        </div>
      </div>
      <div class="sec-hdr" style="margin-top:4px"><span class="sec-title">Qo'shimcha</span></div>
      <div class="card">
        <div class="toggle-wrap">
          <span class="toggle-label">Haftalik avto-hisobot</span>
          <label class="toggle">
            <input type="checkbox" id="st-wr" ${s.auto_weekly_report?"checked":""}>
            <span class="toggle-track"></span>
            <span class="toggle-thumb"></span>
          </label>
        </div>
        <div class="toggle-wrap">
          <span class="toggle-label">Bildirishnomalar</span>
          <label class="toggle">
            <input type="checkbox" id="st-ne" ${s.notifications_enabled?"checked":""}>
            <span class="toggle-track"></span>
            <span class="toggle-thumb"></span>
          </label>
        </div>
      </div>
      <button class="btn-primary" onclick="SA.saveSettings()">Saqlash</button>`);
  },

  async saveSettings() {
    hap.light();
    const body = {
      checkin_reminder_time: document.getElementById("st-cr")?.value||null,
      late_check_time:       document.getElementById("st-lc")?.value||null,
      absent_check_time:     document.getElementById("st-ac")?.value||null,
      auto_report_time:      document.getElementById("st-ar")?.value||null,
      auto_weekly_report:    document.getElementById("st-wr")?.checked,
      notifications_enabled: document.getElementById("st-ne")?.checked,
    };
    try {
      await api("/api/superadmin/settings",{method:"PUT",body});
      hap.ok(); toast("Saqlandi");
    } catch(e) { hap.err(); tg.showAlert(e.message); }
  },
};

// ════════════════════════════════════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════════════════════════════════════
async function boot() {
  if (!tg.initData) {
    setContent(`
      <div class="card card-full" style="text-align:center;padding:40px 20px">
        <div style="font-size:18px;font-weight:800;margin-bottom:10px">Sozlanmagan</div>
        <div style="color:var(--hint);font-size:14px;line-height:1.6">
          Mini App faqat Telegram orqali ochilganda ishlaydi.
        </div>
      </div>`);
    document.getElementById("h-name").textContent = "HR Panel";
    document.getElementById("h-sub").textContent  = "Dev rejimi";
    return;
  }

  try {
    S.me = await api("/api/me");
  } catch(e) {
    setContent(`
      <div class="card card-full" style="text-align:center;padding:40px 20px">
        <div style="font-size:16px;font-weight:700;margin-bottom:8px">Kirish xatosi</div>
        <div style="color:var(--hint);font-size:14px;line-height:1.6">
          ${e.message}<br><br>Botni /start bilan qayta ishga tushiring.
        </div>
      </div>`);
    return;
  }

  const u = S.me;
  document.getElementById("h-av").textContent   = initials(u.full_name);
  document.getElementById("h-name").textContent = u.full_name;
  document.getElementById("h-sub").textContent  = {
    worker:     u.branch?.name || "Ishchi",
    admin:      "Admin" + (u.branch?.name ? " · "+u.branch.name : ""),
    superadmin: "Superadmin",
  }[u.role] || u.role;
  const badge = document.getElementById("h-badge");
  badge.textContent = {worker:"Ishchi",admin:"Admin",superadmin:"Super"}[u.role]||u.role;
  badge.className   = "role-tag " + u.role;

  buildNav(u.role);
}

boot();
</script>
</body>
</html>
