<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HR Bot</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #ffffff);
    --text: var(--tg-theme-text-color, #222222);
    --hint: var(--tg-theme-hint-color, #999999);
    --link: var(--tg-theme-link-color, #2481cc);
    --btn: var(--tg-theme-button-color, #2481cc);
    --btn-text: var(--tg-theme-button-text-color, #ffffff);
    --secondary-bg: var(--tg-theme-secondary-bg-color, #f0f0f0);
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 16px;
    min-height: 100vh;
  }

  .profile-card {
    background: var(--secondary-bg);
    border-radius: var(--radius);
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .avatar {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: var(--btn);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; color: var(--btn-text);
    flex-shrink: 0;
  }

  .profile-info .name {
    font-weight: 600; font-size: 16px;
  }

  .profile-info .role {
    font-size: 13px; color: var(--hint);
    margin-top: 2px;
  }

  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--hint);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin: 16px 0 8px;
  }

  .status-card {
    background: var(--secondary-bg);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .status-left { display: flex; align-items: center; gap: 10px; }

  .status-icon {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .status-icon.green { background: #dcf8e7; }
  .status-icon.red { background: #fde8e8; }
  .status-icon.yellow { background: #fff8dc; }
  .status-icon.gray { background: var(--secondary-bg); filter: brightness(0.92); }

  .status-label { font-weight: 500; font-size: 15px; }
  .status-time { font-size: 13px; color: var(--hint); margin-top: 2px; }
  .status-badge {
    font-size: 12px; font-weight: 600; padding: 4px 10px;
    border-radius: 20px;
  }
  .badge-green { background: #dcf8e7; color: #1a8c45; }
  .badge-red { background: #fde8e8; color: #c0392b; }
  .badge-yellow { background: #fff8dc; color: #8c6d1a; }
  .badge-gray { background: var(--secondary-bg); color: var(--hint); filter: brightness(0.9); }

  .actions-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 4px;
  }

  .action-btn {
    background: var(--secondary-bg);
    border: none;
    border-radius: var(--radius);
    padding: 14px 12px;
    display: flex; flex-direction: column;
    align-items: center; gap: 6px;
    cursor: pointer;
    transition: opacity 0.15s;
    width: 100%;
  }

  .action-btn:active { opacity: 0.7; }

  .action-btn .icon { font-size: 26px; }
  .action-btn .label { font-size: 13px; font-weight: 500; color: var(--text); }

  .action-btn.primary {
    background: var(--btn);
    grid-column: 1 / -1;
  }
  .action-btn.primary .label { color: var(--btn-text); }

  .calendar {
    background: var(--secondary-bg);
    border-radius: var(--radius);
    padding: 12px;
  }

  .cal-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px;
  }

  .cal-title { font-weight: 600; font-size: 15px; }

  .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 3px; text-align: center;
  }

  .cal-day-name {
    font-size: 11px; color: var(--hint); font-weight: 600;
    padding: 2px 0 6px;
  }

  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-size: 13px; border-radius: 50%; position: relative;
  }

  .cal-day.empty { }
  .cal-day.today { background: var(--btn); color: var(--btn-text); font-weight: 700; }
  .cal-day.present::after {
    content: '';
    width: 5px; height: 5px; border-radius: 50%;
    background: #27ae60;
    position: absolute; bottom: 1px;
  }
  .cal-day.late::after {
    content: '';
    width: 5px; height: 5px; border-radius: 50%;
    background: #f39c12;
    position: absolute; bottom: 1px;
  }
  .cal-day.absent::after {
    content: '';
    width: 5px; height: 5px; border-radius: 50%;
    background: #e74c3c;
    position: absolute; bottom: 1px;
  }

  .footer {
    text-align: center;
    color: var(--hint);
    font-size: 12px;
    margin-top: 24px;
    padding-bottom: 8px;
  }

  .loading {
    text-align: center;
    padding: 40px 20px;
    color: var(--hint);
  }

  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--secondary-bg);
    border-top-color: var(--btn);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="app">
  <div class="loading">
    <div class="spinner"></div>
    <div>Yuklanmoqda...</div>
  </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();
tg.ready();

// --- Ma'lumotlar ---
const user = tg.initDataUnsafe?.user || {};
const userName = user.first_name || "Foydalanuvchi";

// Calendar mock data (real data botdan sendData orqali keladi)
const today = new Date();
const todayNum = today.getDate();
const month = today.getMonth();
const year = today.getFullYear();

const MONTH_NAMES = [
  "Yanvar","Fevral","Mart","Aprel","May","Iyun",
  "Iyul","Avgust","Sentabr","Oktabr","Noyabr","Dekabr"
];
const DAY_NAMES = ["Du","Se","Ch","Pa","Ju","Sh","Ya"];

// Bot dan kelgan holat (WebApp.initDataUnsafe dan yoki default)
let todayStatus = "none"; // "checkin" | "checkout" | "lunch_out" | "none"

// --- Render ---
function render() {
  document.getElementById("app").innerHTML = `
    ${renderProfile()}
    ${renderTodayStatus()}
    ${renderActions()}
    ${renderCalendar()}
    <div class="footer">HR Bot · ${year}</div>
  `;
}

function renderProfile() {
  const initials = userName.charAt(0).toUpperCase();
  return `
    <div class="profile-card">
      <div class="avatar">${initials}</div>
      <div class="profile-info">
        <div class="name">${escHtml(userName)}</div>
        <div class="role">Ishchi</div>
      </div>
    </div>
  `;
}

function renderTodayStatus() {
  const dateStr = today.toLocaleDateString("uz-UZ", {day:"2-digit",month:"long",year:"numeric"});
  return `
    <div class="section-title">Bugun · ${dateStr}</div>
    <div class="status-card">
      <div class="status-left">
        <div class="status-icon green">✅</div>
        <div>
          <div class="status-label">Kelish vaqti</div>
          <div class="status-time" id="checkin-time">—</div>
        </div>
      </div>
      <span class="status-badge badge-gray" id="checkin-badge">—</span>
    </div>
    <div class="status-card">
      <div class="status-left">
        <div class="status-icon red">🚪</div>
        <div>
          <div class="status-label">Ketish vaqti</div>
          <div class="status-time" id="checkout-time">—</div>
        </div>
      </div>
      <span class="status-badge badge-gray" id="checkout-badge">—</span>
    </div>
    <div class="status-card">
      <div class="status-left">
        <div class="status-icon yellow">🍽</div>
        <div>
          <div class="status-label">Tushlik</div>
          <div class="status-time" id="lunch-time">—</div>
        </div>
      </div>
      <span class="status-badge badge-gray" id="lunch-badge">—</span>
    </div>
  `;
}

function renderActions() {
  return `
    <div class="section-title">Amallar</div>
    <div class="actions-grid">
      <button class="action-btn primary" onclick="doAction('checkin')">
        <span class="icon">✅</span>
        <span class="label">Keldim</span>
      </button>
      <button class="action-btn" onclick="doAction('checkout')">
        <span class="icon">🚪</span>
        <span class="label">Ketdim</span>
      </button>
      <button class="action-btn" onclick="doAction('lunch_out')">
        <span class="icon">🍽</span>
        <span class="label">Tushlikka ketdim</span>
      </button>
      <button class="action-btn" onclick="doAction('lunch_in')">
        <span class="icon">↩️</span>
        <span class="label">Tushlikdan qaytdim</span>
      </button>
    </div>
  `;
}

function renderCalendar() {
  const firstDay = new Date(year, month, 1).getDay();
  const offset = (firstDay === 0) ? 6 : firstDay - 1;
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  let cells = "";
  for (let i = 0; i < offset; i++) cells += `<div class="cal-day empty"></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    let cls = "cal-day";
    if (d === todayNum) cls += " today";
    cells += `<div class="${cls}">${d}</div>`;
  }

  const dayHeaders = DAY_NAMES.map(d => `<div class="cal-day-name">${d}</div>`).join("");

  return `
    <div class="section-title">Kalendar — ${MONTH_NAMES[month]}</div>
    <div class="calendar">
      <div class="cal-grid">
        ${dayHeaders}
        ${cells}
      </div>
    </div>
  `;
}

// --- Amallar ---
function doAction(action) {
  if (action === "checkin" || action === "checkout") {
    // Lokatsiya olish va botga yuborish
    if (!navigator.geolocation) {
      tg.showAlert("Qurilmangiz GPS ni qo'llab-quvvatlamaydi.");
      return;
    }
    tg.showPopup({
      title: action === "checkin" ? "✅ Keldim" : "🚪 Ketdim",
      message: "GPS lokatsiyangiz olinadi va belgilanadi.",
      buttons: [
        { id: "ok", type: "default", text: "Davom etish" },
        { id: "cancel", type: "cancel", text: "Bekor" },
      ]
    }, (btnId) => {
      if (btnId !== "ok") return;
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const data = JSON.stringify({
            action,
            lat: pos.coords.latitude,
            lon: pos.coords.longitude,
            accuracy: pos.coords.accuracy,
          });
          tg.sendData(data);
        },
        () => {
          tg.showAlert("GPS ma'lumotini olishda xato.\nTelegramda lokatsiya ruxsatini bering.");
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    });
  } else {
    // Tushlik amallar lokatsiyasiz
    const data = JSON.stringify({ action });
    tg.sendData(data);
  }
}

// --- Yordamchi ---
function escHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

// --- Ishga tushirish ---
render();
</script>
</body>
</html>
