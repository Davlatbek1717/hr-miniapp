<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>HR Panel</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
/* ─── Reset & Tokens ──────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:       var(--tg-theme-bg-color,#0f0f0f);
  --bg2:      var(--tg-theme-secondary-bg-color,#1c1c1e);
  --bg3:      color-mix(in srgb,var(--bg2) 60%,var(--bg) 40%);
  --text:     var(--tg-theme-text-color,#ffffff);
  --hint:     var(--tg-theme-hint-color,#8e8e93);
  --link:     var(--tg-theme-link-color,#0a84ff);
  --btn:      var(--tg-theme-button-color,#0a84ff);
  --btn-text: var(--tg-theme-button-text-color,#ffffff);
  --accent:   #30d158;
  --red:      #ff453a;
  --orange:   #ff9f0a;
  --purple:   #bf5af2;
  --r:        14px;
  --r-sm:     10px;
  --hdr:      56px;
  --nav:      52px;
}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif;
  font-size:15px;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
input,textarea,select{font-family:inherit;font-size:inherit}

/* ─── Layout ──────────────────────────────────────────────────────────────── */
#app{display:flex;flex-direction:column;height:100dvh;overflow:hidden}
#header{height:var(--hdr);padding:0 16px;display:flex;align-items:center;
  justify-content:space-between;background:var(--bg);
  border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0}
#nav{height:var(--nav);display:flex;align-items:center;gap:2px;padding:0 8px;
  background:var(--bg);border-bottom:1px solid rgba(255,255,255,.07);
  overflow-x:auto;flex-shrink:0;scrollbar-width:none}
#nav::-webkit-scrollbar{display:none}
#content{flex:1;overflow-y:auto;padding:12px 12px 90px;
  -webkit-overflow-scrolling:touch}

/* ─── Header ──────────────────────────────────────────────────────────────── */
.h-avatar{width:36px;height:36px;border-radius:50%;background:rgba(10,132,255,.2);
  color:var(--link);font-size:14px;font-weight:700;display:flex;
  align-items:center;justify-content:center;flex-shrink:0}
.h-info{flex:1;padding:0 10px}
.h-name{font-size:15px;font-weight:700}
.h-sub{font-size:12px;color:var(--hint);margin-top:1px}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;
  font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.badge.worker{background:rgba(48,209,88,.15);color:var(--accent)}
.badge.admin{background:rgba(10,132,255,.15);color:var(--link)}
.badge.superadmin{background:rgba(191,90,242,.15);color:var(--purple)}

/* ─── Nav Tabs ────────────────────────────────────────────────────────────── */
.tab{flex-shrink:0;padding:7px 12px;border-radius:20px;font-size:12px;
  font-weight:500;cursor:pointer;color:var(--hint);border:none;
  background:transparent;transition:all .2s;white-space:nowrap;
  -webkit-tap-highlight-color:transparent}
.tab.active{background:var(--btn);color:var(--btn-text);font-weight:600}

/* ─── Cards ───────────────────────────────────────────────────────────────── */
.card{background:var(--bg2);border-radius:var(--r);padding:16px;margin-bottom:10px}
.card-title{font-size:11px;font-weight:600;color:var(--hint);text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:12px}
.card-row{display:flex;justify-content:space-between;align-items:center;
  padding:9px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.card-row:last-child{border-bottom:none}
.card-label{font-size:14px;color:var(--hint)}
.card-value{font-size:14px;font-weight:600;text-align:right;max-width:55%}
.sep{height:1px;background:rgba(255,255,255,.06);margin:6px 0}

/* ─── Stats Row ───────────────────────────────────────────────────────────── */
.stats-row{display:flex;gap:8px;margin-bottom:10px}
.stat{flex:1;background:var(--bg2);border-radius:var(--r-sm);padding:12px;text-align:center}
.stat-n{font-size:26px;font-weight:700}
.stat-l{font-size:11px;color:var(--hint);margin-top:2px}
.stat.green .stat-n{color:var(--accent)}
.stat.red   .stat-n{color:var(--red)}
.stat.orange.stat-n{color:var(--orange)}
.stat.blue  .stat-n{color:var(--link)}

/* ─── Action Grid ─────────────────────────────────────────────────────────── */
.act-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.act-btn{background:var(--bg2);border:none;border-radius:var(--r);padding:16px 12px;
  cursor:pointer;color:var(--text);text-align:center;transition:transform .12s,opacity .12s;
  -webkit-tap-highlight-color:transparent}
.act-btn:active{transform:scale(.94);opacity:.75}
.act-btn.primary {background:var(--btn);color:var(--btn-text)}
.act-btn.success {background:rgba(48,209,88,.15);color:var(--accent)}
.act-btn.danger  {background:rgba(255,69,58,.15);color:var(--red)}
.act-btn.warning {background:rgba(255,159,10,.15);color:var(--orange)}
.act-btn.purple  {background:rgba(191,90,242,.15);color:var(--purple)}
.act-btn .aico{font-size:28px;display:block;margin-bottom:6px}
.act-btn .albl{font-size:13px;font-weight:600}
.act-btn:disabled{opacity:.32;cursor:not-allowed;transform:none}

/* ─── Timeline ────────────────────────────────────────────────────────────── */
.timeline{display:flex;justify-content:space-around;padding:14px 0 8px}
.tl{text-align:center;flex:1}
.tl-dot{width:38px;height:38px;border-radius:50%;margin:0 auto 6px;
  display:flex;align-items:center;justify-content:center;font-size:19px}
.tl-dot.done  {background:rgba(48,209,88,.2)}
.tl-dot.active{background:rgba(10,132,255,.2)}
.tl-dot.empty {background:rgba(255,255,255,.08)}
.tl-time{font-size:13px;font-weight:600}
.tl-lbl{font-size:11px;color:var(--hint);margin-top:2px}

/* ─── Worker / List Items ─────────────────────────────────────────────────── */
.list-item{display:flex;align-items:center;gap:12px;padding:11px 0;
  border-bottom:1px solid rgba(255,255,255,.06)}
.list-item:last-child{border-bottom:none}
.list-item.tap{cursor:pointer;-webkit-tap-highlight-color:transparent}
.list-item.tap:active{opacity:.7}
.li-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;
  background:rgba(10,132,255,.18);color:var(--link)}
.li-info{flex:1;min-width:0}
.li-name{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.li-sub{font-size:12px;color:var(--hint);margin-top:2px}
.li-right{flex-shrink:0;text-align:right}
.chevron{color:var(--hint);font-size:18px}

/* ─── Chips ───────────────────────────────────────────────────────────────── */
.chip{font-size:11px;font-weight:600;padding:3px 9px;border-radius:10px;
  display:inline-block;white-space:nowrap}
.chip-present {background:rgba(48,209,88,.15);color:var(--accent)}
.chip-late    {background:rgba(255,159,10,.15);color:var(--orange)}
.chip-absent  {background:rgba(255,255,255,.08);color:var(--hint)}
.chip-lunch   {background:rgba(10,132,255,.15);color:var(--link)}
.chip-pending {background:rgba(255,159,10,.15);color:var(--orange)}
.chip-approved{background:rgba(48,209,88,.15);color:var(--accent)}
.chip-rejected{background:rgba(255,69,58,.15);color:var(--red)}
.dot-badge{width:9px;height:9px;border-radius:50%;display:inline-block}
.dot-badge.on{background:var(--accent)}
.dot-badge.off{background:rgba(255,255,255,.2)}

/* ─── History ─────────────────────────────────────────────────────────────── */
.hist-item{display:flex;align-items:center;gap:10px;padding:9px 0;
  border-bottom:1px solid rgba(255,255,255,.06)}
.hist-item:last-child{border-bottom:none}
.hist-date{font-size:13px;color:var(--hint);min-width:64px}
.hist-times{flex:1;font-size:13px}
.hist-dur{font-size:12px;color:var(--hint)}

/* ─── Leave Card ──────────────────────────────────────────────────────────── */
.leave-card{background:var(--bg2);border-radius:var(--r);padding:14px;margin-bottom:8px}
.leave-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.leave-dates{font-size:15px;font-weight:700}
.leave-meta{font-size:12px;color:var(--hint);margin-top:2px}
.leave-reason{font-size:13px;color:var(--hint);margin-bottom:10px;line-height:1.45}
.leave-acts{display:flex;gap:8px}
.la-btn{flex:1;padding:9px;border:none;border-radius:var(--r-sm);
  font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s}
.la-btn:active{opacity:.7}
.la-btn.approve{background:rgba(48,209,88,.18);color:var(--accent)}
.la-btn.reject {background:rgba(255,69,58,.15);color:var(--red)}

/* ─── Forms ───────────────────────────────────────────────────────────────── */
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--hint);
  text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.form-input{width:100%;background:var(--bg);border:1.5px solid rgba(255,255,255,.12);
  border-radius:var(--r-sm);padding:12px 14px;color:var(--text);font-size:15px;
  outline:none;-webkit-appearance:none;color-scheme:dark;transition:border-color .2s}
.form-input:focus{border-color:var(--btn)}
.form-input::placeholder{color:var(--hint)}
select.form-input{cursor:pointer}
textarea.form-input{resize:none;line-height:1.5}
.form-hint{font-size:12px;color:var(--hint);margin-top:5px}
.submit-btn{width:100%;background:var(--btn);color:var(--btn-text);border:none;
  border-radius:var(--r);padding:14px;font-size:16px;font-weight:600;cursor:pointer;
  margin-top:8px;transition:opacity .15s;-webkit-tap-highlight-color:transparent}
.submit-btn:active{opacity:.8}
.submit-btn:disabled{opacity:.4;cursor:not-allowed}
.danger-btn{width:100%;background:rgba(255,69,58,.15);color:var(--red);border:none;
  border-radius:var(--r);padding:12px;font-size:15px;font-weight:600;cursor:pointer;
  margin-top:8px;transition:opacity .15s}
.danger-btn:active{opacity:.7}

/* ─── Section header ──────────────────────────────────────────────────────── */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sec-title{font-size:12px;font-weight:600;color:var(--hint);text-transform:uppercase;letter-spacing:.4px}
.sec-count{font-size:12px;color:var(--hint)}
.sec-add{font-size:22px;color:var(--btn);cursor:pointer;line-height:1;
  padding:2px 4px;-webkit-tap-highlight-color:transparent}
.sec-add:active{opacity:.6}

/* ─── Loading / Empty ─────────────────────────────────────────────────────── */
.loader{text-align:center;padding:52px 20px;color:var(--hint)}
.spinner{width:28px;height:28px;border:3px solid rgba(255,255,255,.1);
  border-top-color:var(--btn);border-radius:50%;
  animation:spin .65s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:52px 20px;color:var(--hint)}
.empty-ico{font-size:44px;margin-bottom:12px}
.empty-txt{font-size:14px;line-height:1.55}

/* ─── Toast ───────────────────────────────────────────────────────────────── */
#toast{position:fixed;bottom:20px;left:50%;
  transform:translateX(-50%) translateY(14px);
  background:rgba(28,28,30,.96);color:#fff;padding:10px 18px;
  border-radius:24px;font-size:14px;font-weight:500;opacity:0;
  transition:all .25s;z-index:999;white-space:nowrap;
  max-width:88vw;text-align:center;
  backdrop-filter:blur(14px);pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ─── Invite box ──────────────────────────────────────────────────────────── */
.invite-box{background:rgba(48,209,88,.08);border:1px solid rgba(48,209,88,.3);
  border-radius:var(--r-sm);padding:12px 14px;margin-top:10px}
.invite-link{font-size:13px;word-break:break-all;color:var(--accent);margin-bottom:8px}
.copy-btn{background:rgba(48,209,88,.15);color:var(--accent);border:none;
  border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer}
.copy-btn:active{opacity:.7}

/* ─── Misc ────────────────────────────────────────────────────────────────── */
.branch-card{background:var(--bg2);border-radius:var(--r);padding:14px;margin-bottom:8px;
  cursor:pointer;-webkit-tap-highlight-color:transparent}
.branch-card:active{opacity:.75}
.branch-name{font-size:16px;font-weight:700;margin-bottom:4px}
.branch-meta{font-size:13px;color:var(--hint)}
.month-picker{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.month-picker input{flex:1}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="h-avatar" id="h-av">?</div>
    <div class="h-info">
      <div class="h-name" id="h-name">HR Panel</div>
      <div class="h-sub"  id="h-sub">Yuklanmoqda...</div>
    </div>
    <span class="badge" id="h-badge"></span>
  </div>
  <div id="nav"></div>
  <div id="content">
    <div class="loader"><div class="spinner"></div>Yuklanmoqda...</div>
  </div>
</div>
<div id="toast"></div>

<script>
// ════════════════════════════════════════════════════════════════════════════
//  CONFIG
// ════════════════════════════════════════════════════════════════════════════
const API = window.HRBOT_API_URL || "https://understanding-plates-feeding-colleague.trycloudflare.com";
const BOT_USERNAME = "hr_boshqaruv_bot";

// ════════════════════════════════════════════════════════════════════════════
//  TELEGRAM SDK
// ════════════════════════════════════════════════════════════════════════════
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();
tg.disableVerticalSwipes?.();

const MB = tg.MainButton;
const BB = tg.BackButton;

// ════════════════════════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════════════════════════
const S = {
  me: null,
  today: null,
  activeTab: null,
  stack: [],        // [{id, data, render}]
  lookups: {},      // cached: branches, positions, schedules
};

// ════════════════════════════════════════════════════════════════════════════
//  API
// ════════════════════════════════════════════════════════════════════════════
async function api(path, opts = {}) {
  const r = await fetch(API + path, {
    method:  opts.method || "GET",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "tma " + tg.initData,
      ...opts.headers,
    },
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  const json = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(json.detail || "Xato yuz berdi");
  return json;
}

async function getLookup(key) {
  if (S.lookups[key]) return S.lookups[key];
  const data = await api(`/api/lookup/${key}`);
  S.lookups[key] = data;
  return data;
}

// ════════════════════════════════════════════════════════════════════════════
//  TOAST & HAPTICS
// ════════════════════════════════════════════════════════════════════════════
let _tt;
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(_tt);
  _tt = setTimeout(() => el.classList.remove("show"), 3000);
}

const hap = {
  ok:    () => tg.HapticFeedback?.notificationOccurred("success"),
  err:   () => tg.HapticFeedback?.notificationOccurred("error"),
  light: () => tg.HapticFeedback?.impactOccurred("light"),
  med:   () => tg.HapticFeedback?.impactOccurred("medium"),
};

// ════════════════════════════════════════════════════════════════════════════
//  UTILS
// ════════════════════════════════════════════════════════════════════════════
const initials = n => (n||"?").split(" ").slice(0,2).map(w=>w[0]).join("").toUpperCase();
const fmtDate  = iso => { if(!iso) return ""; const [y,m,d]=iso.split("-"); return `${d}.${m}.${y}`; };
const today    = () => new Date().toISOString().slice(0,10);
const thisMonth= () => new Date().toISOString().slice(0,7);

function statusChip(st, atLunch) {
  if (atLunch) return chip("Tushlikda","chip-lunch");
  const M = {present:["Keldi","chip-present"],late:["Kech","chip-late"],
             absent:["Kelmadi","chip-absent"],on_leave:["Ta'tilda","chip-approved"],
             holiday:["Dam olish","chip-approved"]};
  const [l,c] = M[st] || ["—","chip-absent"];
  return chip(l, c);
}
function leaveChip(st) {
  const M = {pending:["Kutilmoqda","chip-pending"],
             approved:["Tasdiqlandi","chip-approved"],rejected:["Rad etildi","chip-rejected"]};
  const [l,c] = M[st] || [st,"chip-absent"];
  return chip(l, c);
}
function chip(label, cls) {
  return `<span class="chip ${cls}">${label}</span>`;
}

const loading = () => `<div class="loader"><div class="spinner"></div>Yuklanmoqda...</div>`;
const empty   = (ico,txt) => `<div class="empty"><div class="empty-ico">${ico}</div><div class="empty-txt">${txt}</div></div>`;
const setContent = html => document.getElementById("content").innerHTML = html;

// ════════════════════════════════════════════════════════════════════════════
//  NAVIGATION (tab + stack)
// ════════════════════════════════════════════════════════════════════════════
const TABS = {
  worker:     [{id:"home",ico:"🏠",lbl:"Bugun"},{id:"history",ico:"📅",lbl:"Tarix"},
               {id:"leave-w",ico:"🏖",lbl:"Ta'til"},{id:"profile",ico:"👤",lbl:"Profil"}],
  admin:      [{id:"monitoring",ico:"📊",lbl:"Bugun"},{id:"workers-a",ico:"👥",lbl:"Xodimlar"},
               {id:"leaves-a",ico:"🏖",lbl:"Ta'tillar"},{id:"report",ico:"📈",lbl:"Hisobot"},
               {id:"att-edit",ico:"✏️",lbl:"Davomat"}],
  superadmin: [{id:"dashboard",ico:"📈",lbl:"Bosh"},{id:"monitoring",ico:"📊",lbl:"Monitoring"},
               {id:"workers-sa",ico:"👥",lbl:"Ishchilar"},{id:"branches",ico:"🏢",lbl:"Filiallar"},
               {id:"positions",ico:"💼",lbl:"Lavozimlar"},{id:"schedules",ico:"⏰",lbl:"Jadvallar"},
               {id:"admins",ico:"👔",lbl:"Adminlar"},{id:"settings",ico:"⚙️",lbl:"Sozlamalar"}],
};

function buildNav(role) {
  const tabs = TABS[role] || TABS.worker;
  document.getElementById("nav").innerHTML = tabs.map(t =>
    `<button class="tab" data-tab="${t.id}" onclick="switchTab('${t.id}')">${t.ico} ${t.lbl}</button>`
  ).join("");
  switchTab(tabs[0].id);
}

function switchTab(id) {
  clearStack();
  S.activeTab = id;
  document.querySelectorAll(".tab").forEach(t =>
    t.classList.toggle("active", t.dataset.tab === id));
  renderTab(id);
}

function clearStack() {
  S.stack = [];
  hideBack();
  hideMB();
}

function pushView(renderFn, data = {}) {
  S.stack.push({renderFn, data});
  showBack();
  setContent(loading());
  renderFn(data).catch(e => setContent(empty("⚠️", e.message)));
}

function popView() {
  S.stack.pop();
  hideMB();
  if (S.stack.length === 0) {
    hideBack();
    renderTab(S.activeTab);
  } else {
    const top = S.stack[S.stack.length - 1];
    setContent(loading());
    top.renderFn(top.data).catch(e => setContent(empty("⚠️", e.message)));
  }
}

function showBack() { BB.show(); BB.onClick(popView); }
function hideBack() { BB.hide(); BB.offClick(popView); }

function showMB(text, fn, color) {
  MB.setText(text);
  if (color) { MB.color = color; }
  MB.onClick(fn);
  MB.show();
}
function hideMB() { MB.hide(); MB.offClick(); }

async function renderTab(id) {
  setContent(loading());
  try {
    const role = S.me?.role;
    switch(id) {
      case "home":       await Worker.renderHome();      break;
      case "history":    await Worker.renderHistory();   break;
      case "leave-w":    await Worker.renderLeave();     break;
      case "profile":         Worker.renderProfile();    break;
      case "monitoring": await Admin.renderMonitoring(); break;
      case "workers-a":  await Admin.renderWorkers();    break;
      case "leaves-a":   await Admin.renderLeaves();     break;
      case "report":          Admin.renderReport();      break;
      case "att-edit":   await Admin.renderAttEdit();    break;
      case "dashboard":  await SA.renderDashboard();     break;
      case "workers-sa": await SA.renderWorkers();       break;
      case "branches":   await SA.renderBranches();      break;
      case "positions":  await SA.renderPositions();     break;
      case "schedules":  await SA.renderSchedules();     break;
      case "admins":     await SA.renderAdmins();        break;
      case "settings":   await SA.renderSettings();      break;
      default: setContent(empty("🔧","Tez orada"));
    }
  } catch(e) {
    setContent(empty("⚠️", e.message));
  }
}

// ════════════════════════════════════════════════════════════════════════════
//  WORKER MODULE
// ════════════════════════════════════════════════════════════════════════════
const Worker = {

  async renderHome() {
    S.today = await api("/api/attendance/today");
    const t = S.today;

    const stMap = {
      present:  ["🟢","Ish joyida","var(--accent)"],
      late:     ["🟡","Kech keldi","var(--orange)"],
      absent:   ["⚪","Hali kelmagan","var(--hint)"],
      on_leave: ["🔵","Ta'tilda","var(--link)"],
      holiday:  ["🟣","Dam olish","var(--purple)"],
    };
    const [sico,slbl,scol] = stMap[t.status] || stMap.absent;
    const dayStr = new Date().toLocaleDateString("uz-UZ",
      {weekday:"long",day:"numeric",month:"long"});

    const tl = [
      {ico:t.check_in ?"✅":"⭕",cls:t.check_in?"done":"empty",  time:t.check_in ||"--:--",lbl:"Keldi"},
      {ico:t.lunch_out?"🍽":"⭕",cls:t.lunch_out?(t.lunch_in?"done":"active"):"empty",
       time:t.lunch_out||"--:--",lbl:"Tushlik"},
      {ico:t.check_out?"🚪":"⭕",cls:t.check_out?"done":"empty", time:t.check_out||"--:--",lbl:"Ketdi"},
    ];

    let workRow = "";
    if (t.work_minutes != null) {
      const h=Math.floor(t.work_minutes/60), m=t.work_minutes%60;
      workRow = `<div class="sep"></div>
        <div class="card-row"><span class="card-label">⏱ Ish vaqti</span>
        <span class="card-value">${h}s ${m}d</span></div>`;
    }

    const canCI  = !t.check_in;
    const canCO  = t.check_in && !t.check_out;
    const canLO  = t.check_in && !t.check_out && !t.lunch_out;
    const canLI  = t.lunch_out && !t.lunch_in && !t.check_out;

    setContent(`
      <div class="card">
        <div style="text-align:center;padding:8px 0 4px">
          <div style="font-size:12px;color:var(--hint);margin-bottom:8px">${dayStr}</div>
          <div style="font-size:44px;margin-bottom:6px">${sico}</div>
          <div style="font-size:17px;font-weight:700;color:${scol}">${slbl}</div>
        </div>
        <div class="timeline">${tl.map(i=>`
          <div class="tl"><div class="tl-dot ${i.cls}">${i.ico}</div>
          <div class="tl-time">${i.time}</div>
          <div class="tl-lbl">${i.lbl}</div></div>`).join("")}
        </div>${workRow}
      </div>
      <div class="act-grid">
        <button class="act-btn${canCI?" success":""}" onclick="Worker.checkin()" ${canCI?"":"disabled"}>
          <span class="aico">✅</span><span class="albl">Keldim</span></button>
        <button class="act-btn${canCO?" danger":""}" onclick="Worker.checkout()" ${canCO?"":"disabled"}>
          <span class="aico">🚪</span><span class="albl">Ketdim</span></button>
        <button class="act-btn${canLO?" warning":""}" onclick="Worker.lunchOut()" ${canLO?"":"disabled"}>
          <span class="aico">🍽</span><span class="albl">Tushlikka</span></button>
        <button class="act-btn${canLI?" primary":""}" onclick="Worker.lunchIn()" ${canLI?"":"disabled"}>
          <span class="aico">↩️</span><span class="albl">Qaytdim</span></button>
      </div>`);
  },

  checkin() {
    tg.showPopup({
      title:"📍 Joylashuvni aniqlash",
      message:"GPS orqali joriy joylashuv tekshiriladi.",
      buttons:[{id:"ok",type:"ok"},{type:"cancel"}],
    }, async btn => {
      if (btn !== "ok") return;
      try {
        const pos = await new Promise((res,rej) =>
          navigator.geolocation.getCurrentPosition(res,rej,
            {enableHighAccuracy:true,timeout:12000}));
        const data = await api("/api/attendance/checkin",{method:"POST",body:{
          lat:pos.coords.latitude, lon:pos.coords.longitude,
          accuracy:pos.coords.accuracy||0}});
        hap.ok(); toast(data.message||"✅ Qabul qilindi");
        Worker.renderHome();
      } catch(e) { hap.err(); tg.showAlert(e.message||"GPS xatosi"); }
    });
  },

  checkout() {
    tg.showConfirm("🚪 Ish kunini tugatmoqchimisiz?", async ok => {
      if (!ok) return;
      try {
        const data = await api("/api/attendance/checkout",{method:"POST"});
        hap.ok(); toast(data.message||"🚪 Qayd etildi");
        Worker.renderHome();
      } catch(e) { tg.showAlert(e.message); }
    });
  },

  async lunchOut() {
    try {
      const data = await api("/api/attendance/lunch_out",{method:"POST"});
      hap.light(); toast(data.message||"🍽 Tushlikka chiqdingiz");
      Worker.renderHome();
    } catch(e) { tg.showAlert(e.message); }
  },

  async lunchIn() {
    try {
      const data = await api("/api/attendance/lunch_in",{method:"POST"});
      hap.light(); toast(data.message||"✅ Tushlikdan qaytdingiz");
      Worker.renderHome();
    } catch(e) { tg.showAlert(e.message); }
  },

  async renderHistory() {
    const rows = await api("/api/attendance/history");
    if (!rows.length) { setContent(empty("📭","Davomat tarixi yo'q")); return; }

    const sico = {present:"🟢",late:"🟡",absent:"⚪",on_leave:"🔵",holiday:"🟣"};
    const present = rows.filter(r=>["present","late"].includes(r.status)).length;
    const late    = rows.filter(r=>r.status==="late").length;
    const absent  = rows.filter(r=>r.status==="absent").length;

    setContent(`
      <div class="stats-row">
        <div class="stat green"><div class="stat-n">${present}</div><div class="stat-l">Keldi</div></div>
        <div class="stat orange"><div class="stat-n">${late}</div><div class="stat-l">Kech</div></div>
        <div class="stat red"><div class="stat-n">${absent}</div><div class="stat-l">Kelmadi</div></div>
      </div>
      <div class="card"><div class="card-title">So'nggi 60 kun</div>
        ${rows.map(r => {
          const dur = r.work_minutes!=null ?
            `${Math.floor(r.work_minutes/60)}s ${r.work_minutes%60}d` : "";
          return `<div class="hist-item">
            <div class="hist-date">${fmtDate(r.date)}</div>
            <div style="font-size:18px">${sico[r.status]||"⚪"}</div>
            <div class="hist-times">${r.check_in||"–"} → ${r.check_out||"–"}</div>
            <div class="hist-dur">${dur}</div>
          </div>`;}).join("")}
      </div>`);
  },

  async renderLeave() {
    const leaves = await api("/api/leave/my");
    const todayStr = today();
    setContent(`
      <div class="card">
        <div class="card-title">Yangi ta'til so'rovi</div>
        <div class="form-group">
          <label class="form-label">Boshlanish sanasi</label>
          <input class="form-input" type="date" id="lv-s" min="${todayStr}"/>

        <div class="form-group">
          <label class="form-label">Tugash sanasi</label>
          <input class="form-input" type="date" id="lv-e" min="${todayStr}"/>

        <div class="form-group">
          <label class="form-label">Sabab</label>
          <textarea class="form-input" id="lv-r" rows="3" placeholder="Ta'til sababini kiriting..."></textarea>
        </div>
        <button class="submit-btn" onclick="Worker.submitLeave()">📤 Yuborish</button>
      </div>
      ${leaves.length ? `
        <div class="sec-hdr" style="margin-top:4px">
          <span class="sec-title">So'rovlar tarixi</span>
        </div>
        ${leaves.map(lv => `
          <div class="leave-card">

              <div>

                <div class="leave-meta">${lv.days} kun</div>
              </div>
              ${leaveChip(lv.status)}
            </div>
            <div class="leave-reason">${lv.reason}</div>

  async submitLeave() {
    const s = document.getElementById("lv-s")?.value;

    const r = document.getElementById("lv-r")?.value.trim();
    if (!s||!e||!r) { toast("⚠️ Barcha maydonlarni to'ldiring"); return; }
    try {

      hap.ok(); toast(data.message||"✅ Yuborildi");
      Worker.renderLeave();
    } catch(e) { tg.showAlert(e.message); }

          <span class="card-value">${u.schedule.lunch_start}–${u.schedule.lunch_end}</span></div>` : ""}
      </div>`);

};

      </div>
      <div class="card">
        <div class="card-title">Qo'shimcha sozlamalar</div>
        <div class="card-row">
          <span class="card-label">📅 Haftalik avto-hisobot</span>
          <label style="position:relative;display:inline-block;width:44px;height:24px;cursor:pointer">
            <input type="checkbox" id="st-wr" ${s.auto_weekly_report?"checked":""}
              style="opacity:0;width:0;height:0"/>
            <span onclick="this.previousElementSibling.checked=!this.previousElementSibling.checked"
              style="position:absolute;inset:0;background:${s.auto_weekly_report?"var(--accent)":"rgba(255,255,255,.15)"};
              border-radius:24px;transition:background .2s"></span>
          </label>
        </div>
        <div class="card-row">
          <span class="card-label">🔔 Bildirishnomalar</span>
          <label style="position:relative;display:inline-block;width:44px;height:24px;cursor:pointer">
            <input type="checkbox" id="st-ne" ${s.notifications_enabled?"checked":""}
              style="opacity:0;width:0;height:0"/>
            <span onclick="this.previousElementSibling.checked=!this.previousElementSibling.checked"
              style="position:absolute;inset:0;background:${s.notifications_enabled?"var(--accent)":"rgba(255,255,255,.15)"};
              border-radius:24px;transition:background .2s"></span>
          </label>
        </div>
      </div>
      <button class="submit-btn" onclick="SA.saveSettings()">💾 Saqlash</button>`);
  },

  async saveSettings() {
    const body = {
      checkin_reminder_time: document.getElementById("st-cr")?.value||null,
      late_check_time:       document.getElementById("st-lc")?.value||null,
      absent_check_time:     document.getElementById("st-ac")?.value||null,
      auto_report_time:      document.getElementById("st-ar")?.value||null,
      auto_weekly_report:    document.getElementById("st-wr")?.checked,
      notifications_enabled: document.getElementById("st-ne")?.checked,
    };
    try {
      await api("/api/superadmin/settings",{method:"PUT",body});
      hap.ok(); toast("✅ Saqlandi");
    } catch(e) { tg.showAlert(e.message); }
  },
};


// ════════════════════════════════════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════════════════════════════════════
async function boot() {
  if (!tg.initData || API.includes("YOUR_VPS_HTTPS_URL")) {
    setContent(`
      <div class="card" style="text-align:center;padding:32px 20px">
        <div style="font-size:52px;margin-bottom:12px">🔧</div>
        <div style="font-size:18px;font-weight:700;margin-bottom:10px">Sozlanmagan</div>
        <div style="color:var(--hint);font-size:14px;line-height:1.6">
          Mini App faqat Telegram orqali ochilganda ishlaydi.
        </div>
      </div>`);
    document.getElementById("h-name").textContent = "HR Panel";
    document.getElementById("h-sub").textContent  = "Dev rejimi";
    return;
  }

  try {
    S.me = await api("/api/me");
  } catch(e) {
    setContent(`
      <div class="empty">
        <div class="empty-ico">🔐</div>
        <div class="empty-txt">${e.message}<br><br>
          Botni /start bilan qayta ishga tushiring.</div>
      </div>`);
    return;
  }

  const u = S.me;
  document.getElementById("h-av").textContent    = initials(u.full_name);
  document.getElementById("h-name").textContent  = u.full_name;
  const subMap = {
    worker:     u.branch?.name || "Ishchi",
    admin:      "Admin · " + (u.branch?.name||""),
    superadmin: "Superadmin",
  };
  document.getElementById("h-sub").textContent   = subMap[u.role] || u.role;
  const badge = document.getElementById("h-badge");
  badge.textContent = {worker:"Ishchi",admin:"Admin",superadmin:"Superadmin"}[u.role]||u.role;
  badge.className   = "badge " + u.role;

  buildNav(u.role);
}

boot();
</script>
